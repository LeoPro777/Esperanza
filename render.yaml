services:
  - type: web
    name: esperanza-plataforma
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin
